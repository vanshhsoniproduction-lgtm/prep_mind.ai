<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMind AI | AI Technical Interviewer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'g-blue': '#1A73E8',
                        'g-blue-hover': '#1b66c9',
                        'g-red': '#EA4335',
                        'g-yellow': '#FBBC04',
                        'g-green': '#34A853',
                        'g-bg': '#F8F9FA',
                        'g-surface': '#FFFFFF',
                        'g-border': '#DADCE0',
                        'g-text-primary': '#202124',
                        'g-text-secondary': '#5F6368',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Use Inter to simulate Google Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-g-bg text-g-text-primary min-h-screen flex flex-col antialiased">
    {% block content %}
    {% endblock %}
</body>
</html>
