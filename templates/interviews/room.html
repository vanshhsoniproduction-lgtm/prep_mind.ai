{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-color: #202124 !important;
        color: white !important;
        margin: 0;
        overflow: hidden;
    }

    nav { display: none; }

    .room-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }

    .room-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 25px;
        background: rgba(0,0,0,0.5);
    }

    .room-title {
        font-size: 1.1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .timer {
        background: rgba(255,255,255,0.1);
        padding: 6px 12px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 1.1rem;
    }

    .room-main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .ai-orb-container {
        position: absolute;
        top: 25%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }

    .ai-orb {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, #1A73E8 0%, #174EA6 100%);
        box-shadow: 0 0 50px rgba(26, 115, 232, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        transition: all 0.3s ease-in-out;
    }

    .ai-orb.speaking {
        animation: pulse 1s infinite alternate;
        box-shadow: 0 0 100px rgba(26, 115, 232, 0.8), 0 0 150px rgba(52, 168, 83, 0.4);
        transform: scale(1.1);
    }

    .ai-orb.listening {
        background: radial-gradient(circle, #34A853 0%, #188038 100%);
        box-shadow: 0 0 50px rgba(52, 168, 83, 0.5);
        animation: listenPulse 1.5s infinite alternate;
    }
    
    .ai-orb.thinking {
        background: radial-gradient(circle, #FBBC05 0%, #F9A825 100%);
        box-shadow: 0 0 50px rgba(251, 188, 5, 0.5);
        animation: thinkPulse 0.8s infinite alternate;
    }

    @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 40px rgba(26, 115, 232, 0.5); }
        100% { transform: scale(1.15); box-shadow: 0 0 80px rgba(26, 115, 232, 0.9); }
    }

    @keyframes listenPulse {
        0% { transform: scale(1); box-shadow: 0 0 30px rgba(52, 168, 83, 0.3); }
        100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(52, 168, 83, 0.7); }
    }
    
    @keyframes thinkPulse {
        0% { transform: scale(1); box-shadow: 0 0 30px rgba(251, 188, 5, 0.3); }
        100% { transform: scale(1.08); box-shadow: 0 0 50px rgba(251, 188, 5, 0.7); }
    }

    .captions {
        position: absolute;
        bottom: 120px;
        width: 80%;
        max-width: 800px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 500;
        line-height: 1.4;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        min-height: 80px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
    }

    .captions .ai-text { color: white; }
    .captions .user-text { color: #8AB4F8; font-style: italic; }

    .room-controls {
        background: rgba(32, 33, 36, 0.9);
        padding: 20px 40px;
        display: flex;
        justify-content: center;
        gap: 20px;
        position: absolute;
        bottom: 0;
        width: 100%;
        backdrop-filter: blur(10px);
    }

    .ctrl-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: #3C4043;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .ctrl-btn:hover { background: #5F6368; }
    
    .ctrl-btn.mic-active {
        background: #EA4335;
        color: white;
        animation: micGlow 1s infinite alternate;
    }

    @keyframes micGlow {
        0% { box-shadow: 0 0 10px rgba(234, 67, 53, 0.3); }
        100% { box-shadow: 0 0 25px rgba(234, 67, 53, 0.7); }
    }

    .ctrl-btn.btn-end {
        background: #EA4335;
        border-radius: 30px;
        width: 100px;
    }

    .ctrl-btn.btn-end:hover { background: #D93025; }

    .status-text {
        position: absolute;
        bottom: 100px;
        font-size: 0.9rem;
        color: #9AA0A6;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 600;
    }
</style>

<div class="room-container">
    <div class="room-header">
        <div class="room-title">
            <i class="fa-solid fa-microphone-lines" style="color: #8AB4F8;"></i>
            PrepMind AI
        </div>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>

    <div class="room-main">
        <div class="ai-orb-container">
            <div class="ai-orb" id="aiOrb">
                <i class="fa-solid fa-robot"></i>
            </div>
        </div>

        <div class="status-text" id="statusText">CONNECTING...</div>

        <div class="captions">
            <div id="captionBox" class="ai-text">Initializing AI Engine...</div>
        </div>
    </div>

    <div class="room-controls">
        <button class="ctrl-btn" id="micBtn" disabled>
            <i class="fa-solid fa-microphone-slash"></i>
        </button>
        <button class="ctrl-btn btn-end" id="endBtn">
            <i class="fa-solid fa-phone-slash"></i>
        </button>
    </div>
</div>

<script>
    const sessionId = "{{ session.id }}";
    const csrfToken = "{{ csrf_token }}";
    const initialQuestion = `{{ first_question_text|escapejs }}`;

    const orb = document.getElementById('aiOrb');
    const captions = document.getElementById('captionBox');
    const statusText = document.getElementById('statusText');
    const micBtn = document.getElementById('micBtn');
    const endBtn = document.getElementById('endBtn');
    const audioPlayer = new Audio();
    
    // Timer
    let seconds = 0;
    setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('timerDisplay').textContent = `${m}:${s}`;
    }, 1000);

    endBtn.addEventListener('click', () => {
        if(confirm('End this interview session?')) {
            window.location.href = '/dashboard/';
        }
    });

    console.log("[ROOM] Session:", sessionId);
    console.log("[ROOM] Initial Q:", initialQuestion);

    // ============== STATE MACHINE ==============
    let started = false;
    let isBusy = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let mediaStream = null;

    // ============== INIT ==============
    document.addEventListener("DOMContentLoaded", async () => {
        // Request mic permission early
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log("[MIC] ✅ Microphone permission granted");
            statusText.textContent = "CLICK MIC TO START INTERVIEW";
            captions.textContent = "Press the Microphone to Begin";
            micBtn.disabled = false;
        } catch(e) {
            console.error("[MIC] ❌ Mic permission denied:", e);
            statusText.textContent = "⚠️ MICROPHONE ACCESS REQUIRED";
            captions.textContent = "Please allow microphone access and refresh the page.";
            return;
        }
        
        micBtn.addEventListener('click', () => {
            if(isBusy) return;
            
            if(!started) {
                started = true;
                console.log("[ROOM] 🚀 Interview started!");
                fetchTTS(initialQuestion);
            } else {
                toggleRecording();
            }
        });
    });

    // ============== TTS (AI speaks) ==============
    async function fetchTTS(textToSpeak) {
        isBusy = true;
        orb.className = "ai-orb thinking";
        statusText.textContent = "AI IS GENERATING VOICE...";
        captions.className = "ai-text";
        captions.textContent = textToSpeak;
        console.log("[TTS] 🔊 Requesting:", textToSpeak.substring(0, 80));

        try {
            const response = await fetch('/interviews/api/tts/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ text: textToSpeak })
            });
            const data = await response.json();
            console.log("[TTS] Response:", data.status);
            
            if(data.status === 'success' && data.audio_url) {
                playAudio(data.audio_url, textToSpeak);
            } else {
                browserTTS(textToSpeak);
            }
        } catch (error) {
            console.error("[TTS] ❌", error);
            browserTTS(textToSpeak);
        }
    }

    function browserTTS(text) {
        console.log("[BROWSER-TTS] 🗣️ Fallback");
        const synth = window.speechSynthesis;
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        u.voice = voices.find(v => v.lang.includes('en-US')) || voices[0];
        u.rate = 0.95;
        
        u.onstart = () => {
            orb.className = "ai-orb speaking";
            statusText.textContent = "AI IS SPEAKING";
            captions.className = "ai-text";
            captions.textContent = text;
        };
        u.onend = () => onAIDoneSpeaking();
        u.onerror = () => { isBusy = false; statusText.textContent = "TTS ERROR. CLICK MIC."; };
        synth.speak(u);
    }
    
    function playAudio(audioUrl, text) {
        console.log("[AUDIO] ▶️ Playing:", audioUrl);
        audioPlayer.src = audioUrl;
        audioPlayer.onplay = () => {
            orb.className = "ai-orb speaking";
            statusText.textContent = "AI IS SPEAKING";
            captions.className = "ai-text";
            captions.textContent = text;
        };
        audioPlayer.onended = () => onAIDoneSpeaking();
        audioPlayer.onerror = () => browserTTS(text);
        audioPlayer.play().catch(() => browserTTS(text));
    }
    
    function onAIDoneSpeaking() {
        console.log("[AUDIO] ⏹️ AI done speaking, auto-starting recording");
        isBusy = false;
        startRecording();
    }

    // ============== RECORDING (MediaRecorder → ElevenLabs STT) ==============
    function toggleRecording() {
        if(mediaRecorder && mediaRecorder.state === 'recording') {
            stopRecording();
        } else {
            startRecording();
        }
    }

    function startRecording() {
        if(isBusy) return;
        if(mediaRecorder && mediaRecorder.state === 'recording') return;
        
        console.log("[REC] 🔴 Starting recording...");
        audioChunks = [];
        
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
        
        mediaRecorder.ondataavailable = (e) => {
            if(e.data.size > 0) {
                audioChunks.push(e.data);
            }
        };
        
        mediaRecorder.onstop = () => {
            console.log("[REC] ⏹️ Recording stopped, sending to ElevenLabs STT...");
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            console.log("[REC] 📦 Audio blob size:", audioBlob.size, "bytes");
            sendAudioForTranscription(audioBlob);
        };
        
        mediaRecorder.start();
        
        micBtn.className = "ctrl-btn mic-active";
        micBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
        orb.className = "ai-orb listening";
        statusText.textContent = "🔴 RECORDING... CLICK MIC TO STOP";
        captions.className = "user-text";
        captions.textContent = "Speak now... Click mic when done.";
    }

    function stopRecording() {
        if(mediaRecorder && mediaRecorder.state === 'recording') {
            console.log("[REC] 🛑 Stopping...");
            mediaRecorder.stop();
            micBtn.className = "ctrl-btn";
            micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
        }
    }

    // ============== SEND AUDIO TO BACKEND FOR STT ==============
    async function sendAudioForTranscription(audioBlob) {
        isBusy = true;
        orb.className = "ai-orb thinking";
        statusText.textContent = "TRANSCRIBING YOUR SPEECH...";
        captions.className = "user-text";
        captions.textContent = "Processing audio...";
        
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        
        console.log("[STT] 📤 Sending audio to /interviews/api/transcribe/");
        
        try {
            const response = await fetch('/interviews/api/transcribe/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken },
                body: formData
            });
            const data = await response.json();
            console.log("[STT] 📥 Response:", data);
            
            if(data.status === 'success' && data.transcript && data.transcript.trim().length > 0) {
                console.log("[STT] ✅ Transcript:", data.transcript);
                captions.className = "user-text";
                captions.textContent = `"${data.transcript}"`;
                
                // Small delay to show the transcript, then send to Gemini
                setTimeout(() => sendToGemini(data.transcript), 1000);
            } else {
                console.log("[STT] ⚠️ Empty transcript");
                isBusy = false;
                statusText.textContent = "COULDN'T HEAR YOU. CLICK MIC TO TRY AGAIN.";
                captions.textContent = "Try speaking louder or longer.";
            }
        } catch(error) {
            console.error("[STT] ❌ Error:", error);
            isBusy = false;
            statusText.textContent = "TRANSCRIPTION ERROR. CLICK MIC TO RETRY.";
        }
    }

    // ============== SEND TO GEMINI ==============
    async function sendToGemini(text) {
        orb.className = "ai-orb thinking";
        statusText.textContent = "AI IS THINKING...";
        captions.className = "ai-text";
        captions.textContent = "Generating response...";
        
        console.log("[GEMINI] 📤 Sending:", text.substring(0, 80));
        
        try {
            const response = await fetch(`/interviews/api/response/${sessionId}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ transcript: text })
            });
            const data = await response.json();
            console.log("[GEMINI] 📥 Response:", data.status, data.ai_text?.substring(0, 80));
            
            if(data.status === 'success') {
                if(data.audio_url) {
                    playAudio(data.audio_url, data.ai_text);
                } else {
                    browserTTS(data.ai_text);
                }
            } else {
                isBusy = false;
                statusText.textContent = "ERROR. CLICK MIC TO TRY AGAIN.";
            }
        } catch (error) {
            console.error("[GEMINI] ❌", error);
            isBusy = false;
            statusText.textContent = "CONNECTION ERROR. CLICK MIC TO RETRY.";
        }
    }
</script>
{% endblock %}
