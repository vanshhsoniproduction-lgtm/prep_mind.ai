{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-color: #202124 !important;
        color: white !important;
        margin: 0;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    nav { display: none !important; }

    .meet-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }

    .meet-main {
        flex: 1;
        display: flex;
        padding: 16px;
        gap: 16px;
        height: calc(100vh - 80px);
    }

    .video-section {
        flex: 1;
        background: #3c4043;
        border-radius: 8px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    #userVideo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
    }

    .ai-overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.6);
        padding: 12px 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .ai-orb {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #8ab4f8;
        box-shadow: 0 0 15px rgba(138, 180, 248, 0.5);
    }

    .ai-orb.speaking {
        animation: pulse 1s infinite alternate;
        background: #34A853;
        box-shadow: 0 0 30px rgba(52, 168, 83, 0.8);
    }

    @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 10px rgba(52, 168, 83, 0.5); }
        100% { transform: scale(1.1); box-shadow: 0 0 30px rgba(52, 168, 83, 0.9); }
    }

    .ai-subtitle-container {
        position: absolute;
        bottom: 40px;
        left: 0;
        width: 100%;
        text-align: center;
        z-index: 20;
    }

    #aiSubtitle {
        background: rgba(0,0,0,0.7);
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 1.1rem;
        display: inline-block;
        max-width: 80%;
    }

    .code-section {
        width: 45%;
        background: #282c34;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid #5f6368;
    }

    .code-header {
        background: #1e1e1e;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #3c4043;
    }

    .controls-bar {
        height: 80px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
    }

    .center-controls {
        display: flex;
        gap: 16px;
        align-items: center;
    }

    .control-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #3c4043;
        color: white;
        border: 1px solid #5f6368;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.2s;
    }

    .control-btn:hover { background: #4a4d51; }
    .control-btn.active-recording { background: #8ab4f8; color: #202124; }
    .control-btn.off { background: #ea4335; color: white; border-color: #ea4335; }
    .end-btn { background: #ea4335; width: 70px; border-radius: 25px; border-color: #ea4335; }
    .end-btn:hover { background: #d93025; }
    
    .mic-recording {
        background-color: #ef4444 !important;
        animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

</style>

<div class="meet-container">
    <div class="meet-main">
        <!-- Video Left -->
        <div class="video-section">
            <div class="ai-overlay">
                <div class="ai-orb" id="aiAvatar"></div>
                <span style="font-weight: 500;" id="systemStatus">Ready when you are.</span>
            </div>
            
            <video id="userVideo" autoplay playsinline muted></video>
            
            <div id="cameraOffIndicator" style="display:none; position:absolute; font-size: 3rem; color: #9aa0a6;">
                <i class="fas fa-video-slash"></i>
            </div>

            <div class="ai-subtitle-container">
                <div id="aiSubtitle">Connecting to AI Interviewer...</div>
            </div>
            
            <!-- Hidden Audio Waves and Transcript Area as requested by script -->
            <div id="audioWaves" style="display:none; opacity:0;"></div>
            <div id="transcriptArea" style="display:none;"></div>
        </div>

        <!-- Code Editor Right -->
        <div class="code-section" id="codePane">
            <div class="code-header">
                <div style="font-weight: 600; color: #e8eaed; display:flex; align-items:center; gap:8px;">
                    <i class="fas fa-code"></i> Workspace
                </div>
                <select id="languageSelect" style="background: #3c4043; color: white; border: none; padding: 6px 12px; border-radius: 6px; outline:none;">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                </select>
            </div>
            
            <div style="padding: 12px 16px; background: #202124; border-bottom: 1px solid #3c4043; font-size: 0.9rem; flex: 0 0 35%; overflow-y:auto; color: #bdc1c6; display: flex; flex-direction: column;">
                <strong style="color:#8ab4f8;">Problem:</strong> 
                <span id="problemText">Loading problem...</span>
            </div>

            <div id="editor" style="flex: 1; width: 100%;"></div>

            <div style="padding: 12px 16px; background: #1e1e1e; border-top: 1px solid #3c4043; display: flex; justify-content: flex-end;">
                <button id="submitCodeBtn" style="background: #8ab4f8; color: #202124; font-weight: 600; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; display:flex; align-items:center; gap:8px; transition:all 0.2s;">
                    <i class="fas fa-play"></i> Run & Submit
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-bar">
        <div style="color: white; font-weight: 500; font-size:1.1rem;" id="timeDisplay">00:00</div>
        
        <div class="center-controls">
            <button class="control-btn" id="micBtn" title="Toggle Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn" id="cameraBtn" title="Toggle Camera">
                <i class="fas fa-video"></i>
            </button>
            <button class="control-btn end-btn" id="endSessionBtn" title="Leave call">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>

        <div style="color: #9aa0a6; font-size: 0.9rem;">
            PrepMind.ai
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
<script>
    // === NEW CAMERA JS ===
    const userVideo = document.getElementById('userVideo');
    const cameraBtn = document.getElementById('cameraBtn');
    const cameraOffIndicator = document.getElementById('cameraOffIndicator');
    let videoStream = null;
    let cameraOn = true;

    async function initCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            userVideo.srcObject = videoStream;
        } catch(err) {
            console.error("Camera error:", err);
            toggleCameraUI(false);
        }
    }

    function toggleCameraUI(isOn) {
        cameraOn = isOn;
        if(isOn) {
            cameraBtn.classList.remove('off');
            cameraBtn.innerHTML = '<i class="fas fa-video"></i>';
            userVideo.style.display = 'block';
            cameraOffIndicator.style.display = 'none';
        } else {
            cameraBtn.classList.add('off');
            cameraBtn.innerHTML = '<i class="fas fa-video-slash"></i>';
            userVideo.style.display = 'none';
            cameraOffIndicator.style.display = 'block';
        }
    }

    cameraBtn.addEventListener('click', () => {
        if(videoStream) {
            const tracks = videoStream.getVideoTracks();
            tracks.forEach(t => t.enabled = !t.enabled);
            toggleCameraUI(!cameraOn);
        } else {
            initCamera();
        }
    });

    initCamera();

    // Clock
    let seconds = 0;
    setInterval(() => {
        seconds++;
        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
        const secs = String(seconds % 60).padStart(2, '0');
        document.getElementById('timeDisplay').innerText = `${mins}:${secs}`;
    }, 1000);

    // Mock transcript function
    function addTranscriptMessage() {}

    // --- Configuration ---
    const sessionId = "{{ session.id }}";
    const initialQuestion = "{{ first_question_text|escapejs }}";
    
    // UI Elements
    const micBtn = document.getElementById('micBtn');
    const aiSubtitle = document.getElementById('aiSubtitle');
    const transcriptArea = document.getElementById('transcriptArea');
    const systemStatus = document.getElementById('systemStatus');
    const aiAvatar = document.getElementById('aiAvatar');
    const audioWaves = document.getElementById('audioWaves');
    const codePane = document.getElementById('codePane');
    const problemText = document.getElementById('problemText');
    const submitCodeBtn = document.getElementById('submitCodeBtn');
    const endSessionBtn = document.getElementById('endSessionBtn');

    // Add keyframes
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        .mic-recording {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
            transform: scale(1.1);
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    `;
    document.head.appendChild(style);

    // --- Editor Setup ---
    let editor;
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor'), {
            value: '// Write your code here...\n',
            language: 'javascript',
            theme: 'vs-dark',
            minimap: { enabled: false },
            fontSize: 14,
            padding: { top: 20 },
            scrollBeyondLastLine: false,
            smoothScrolling: true,
            cursorBlinking: "smooth",
            automaticLayout: true
        });
    });

    document.getElementById('languageSelect').addEventListener('change', (e) => {
        if (editor) {
            monaco.editor.setModelLanguage(editor.getModel(), e.target.value);
        }
    });

    // --- Speech Synthesis ---
    const synth = window.speechSynthesis;
    let currentlySpeaking = false;
    
    function speakText(text) {
        return new Promise((resolve) => {
            synth.cancel(); 
            currentlySpeaking = true;
            
            // Cleanup markdown formatting visually
            const displayClean = text.replace(/#/g, '').trim();
            aiSubtitle.innerText = displayClean;
            
            // Clean for speech
            const cleanText = text.replace(/[*_#]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            let voices = synth.getVoices();
            let selectedVoice = voices.find(v => v.name.includes('Google') && v.name.includes('Female'));
            if (!selectedVoice) selectedVoice = voices.find(v => (v.lang === 'en-US' || v.lang === 'en-GB') && v.name.includes('Female'));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB');
            if (selectedVoice) utterance.voice = selectedVoice;
            
            utterance.rate = 1.05;
            utterance.pitch = 1.1;

            utterance.onstart = () => {
                aiAvatar.classList.add('speaking', 'border-blue-300', 'shadow-[0_0_80px_rgba(37,99,235,0.7)]');
                audioWaves.style.opacity = '1';
                addTranscriptMessage("Interviewer", displayClean, "ai");
            };
            
            utterance.onend = () => {
                aiAvatar.classList.remove('speaking', 'border-blue-300', 'shadow-[0_0_80px_rgba(37,99,235,0.7)]');
                audioWaves.style.opacity = '0';
                currentlySpeaking = false;
                resolve();
            };
            
            utterance.onerror = () => {
                aiAvatar.classList.remove('speaking', 'border-blue-300');
                audioWaves.style.opacity = '0';
                currentlySpeaking = false;
                resolve();
            };

            synth.speak(utterance);
        });
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => {};
    }

    // --- Speech Recognition ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('mic-recording');
            micBtn.innerHTML = '<i class="fas fa-stop text-2xl"></i>';
            systemStatus.innerText = "Listening... (Click to stop)";
        };

        recognition.onresult = (event) => {
            const transcript = Array.from(event.results)
                .map(result => result[0].transcript)
                .join('');
            aiSubtitle.innerText = transcript;
        };

        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('mic-recording');
            micBtn.innerHTML = '<i class="fas fa-microphone text-2xl"></i>';
            systemStatus.innerText = "Processing...";
            
            if (aiSubtitle.innerText && aiSubtitle.innerText !== "Listening..." && !aiSubtitle.innerText.includes("Thinking") && !aiSubtitle.innerText.includes("Ready")) {
                const textToSend = aiSubtitle.innerText;
                addTranscriptMessage("You", textToSend, "user");
                aiSubtitle.innerText = "Thinking...";
                sendResponse(textToSend);
            } else {
                systemStatus.innerText = "Ready when you are.";
                aiSubtitle.innerText = "Awaiting your response.";
            }
        };

        recognition.onerror = (event) => {
            systemStatus.innerText = "Error: " + event.error;
            isRecording = false;
            micBtn.classList.remove('mic-recording');
            micBtn.innerHTML = '<i class="fas fa-microphone text-2xl"></i>';
        };
    } else {
        alert("Speech recognition is not supported in this browser. Please use Chrome.");
    }

    // Event Listeners
    micBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            if(currentlySpeaking) synth.cancel();
            aiSubtitle.innerText = "Listening...";
            recognition.start();
        }
    });

    submitCodeBtn.addEventListener('click', () => {
        const code = editor.getValue();
        const language = document.getElementById('languageSelect').value;
        const problem = problemText.innerText;
        
        if (code.trim().length <= 5) {
            alert("Please write some code first.");
            return;
        }
        
        submitCodeBtn.disabled = true;
        submitCodeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Evaluating...';
        addTranscriptMessage("System", "Code submitted for evaluation...", "sys");

        fetch('/interviews/api/evaluate/' + sessionId + '/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, language, problem })
        })
        .then(res => res.json())
        .then(data => {
            submitCodeBtn.disabled = false;
            submitCodeBtn.innerHTML = '<i class="fas fa-play"></i> Run & Submit';
            
            if (data.status === 'success') {
                if(data.type !== 'coding') {
                   codePane.classList.add('hidden'); 
                }
                
                speakText(data.ai_text).then(() => {
                    if (data.is_ended) {
                        window.location.href = data.redirect_url || '/dashboard/';
                    }
                });
            }
        }).catch(e => {
            console.error(e);
            submitCodeBtn.disabled = false;
            submitCodeBtn.innerHTML = '<i class="fas fa-play"></i> Run & Submit';
            alert("An error occurred while evaluating your code.");
        });
    });
    
    endSessionBtn.addEventListener('click', () => {
       if(confirm('Are you sure you want to end this interview?')) {
           window.location.href = '/analytics/'; 
       }
    });

    // --- Network / Communication ---
    function sendResponse(transcript) {
        fetch('/interviews/api/response/' + sessionId + '/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'error') {
                systemStatus.innerText = "Error: " + data.message;
                return;
            }
            
            if (data.is_ended) {
                speakText(data.ai_text).then(() => {
                    alert("Interview Concluded. Redirecting to Dashboard.");
                    window.location.href = data.redirect_url || '/dashboard/';
                });
                return;
            }

            systemStatus.innerText = "Ready when you are.";
            
            if (data.type === 'coding') {
                codePane.classList.remove('hidden');
                problemText.innerHTML = data.problem ? data.problem.replace(/\n/g, '<br>') : "Please solve the problem described by the interviewer.";
                if(data.language && document.getElementById('languageSelect').querySelector(`option[value="${data.language}"]`)) {
                    document.getElementById('languageSelect').value = data.language;
                    if(editor) monaco.editor.setModelLanguage(editor.getModel(), data.language);
                }
                // layout editor to fix width bug when revealing dynamically
                setTimeout(() => { if(editor) editor.layout(); }, 350);
            } else {
                codePane.classList.add('hidden');
            }
            
            speakText(data.ai_text);
        })
        .catch(err => {
            console.error("Fetch error: ", err);
            systemStatus.innerText = "Network error. Try again.";
        });
    }

    // --- Helpers ---
    function addTranscriptMessage(sender, text, type="user") {
        const div = document.createElement('div');
        
        if(type === 'ai') {
            div.className = "p-5 rounded-2xl max-w-[85%] mb-2 shadow-sm bg-white border border-gray-100 self-start mr-auto relative";
            div.innerHTML = `<span class="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider absolute -top-2.5 left-5 border border-blue-200 shadow-sm">${sender}</span><p class="mt-1 leading-relaxed text-gray-800 font-medium text-[15px]">${text.replace(/#/g, '')}</p>`;
        } else if (type === 'user') {
            div.className = "p-4 rounded-2xl max-w-[75%] mb-2 shadow-md bg-blue-600 text-white self-end ml-auto relative";
            div.innerHTML = `<p class="leading-relaxed whitespace-pre-wrap font-medium">${text}</p><div class="absolute -right-1 bottom-4 w-3 h-3 bg-blue-600 transform rotate-45"></div>`;
        } else {
            div.className = "p-2 rounded max-w-full text-center mx-auto block mb-2";
            div.innerHTML = `<span class="bg-gray-200/80 text-gray-600 text-xs px-3 py-1 font-bold uppercase tracking-wider rounded-full shadow-inner border border-gray-300/50">${text}</span>`;
        }

        transcriptArea.appendChild(div);
        transcriptArea.scrollTop = transcriptArea.scrollHeight;
    }

    // Initial load
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (initialQuestion && initialQuestion.trim() !== '') {
                speakText(initialQuestion);
            }
        }, 1000);
    });

</script>
{% endblock %}
